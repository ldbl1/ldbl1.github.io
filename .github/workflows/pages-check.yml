name: Pages smoke check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check files exist
        run: |
          test -f index.html
          test -f style.css
          test -f script.js
          test -f config.js
          test -f data/manfred.json
