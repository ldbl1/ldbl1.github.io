name: Pages smoke check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          test -f index.html
          test -f posts/articles.json
          test -f posts/docker-sin-dolor.html
          test -f posts/como-enfoco-proyectos-automatizacion.html
          grep -q "themeToggle" posts/docker-sin-dolor.html
          grep -q "data-theme" posts/docker-sin-dolor.html
